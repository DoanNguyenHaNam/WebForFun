<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PminMod | Download</title>

  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/download.css">
</head>

<body>

<div class="wrap">
  <a href="index.html" class="back">← Quay lại</a>

  <div id="app">Loading...</div>
</div>

<script>
const DATA = 'data.json';
const CMT = 'cmt.json';

const app = document.getElementById("app");

// ====== UTILS ======

function getParam(name){
  return new URL(location.href).searchParams.get(name);
}

// mask tên
function maskName(name){
  return name.split(" ").map(w=>{
    if(w.length <= 2) return w;
    return w.slice(0,2) + "***";
  }).join(" ");
}

// random không trùng
function pickRandom(arr, count){
  let shuffled = [...arr].sort(()=>0.5-Math.random());
  return shuffled.slice(0, count);
}

// lấy youtube id
function getYT(url){
  let match = url.match(/v=([^&]+)/);
  return match ? match[1] : "";
}

// ====== MAIN ======

async function init(){
  const key = getParam("api");

  const [dataRes, cmtRes] = await Promise.all([
    fetch(DATA),
    fetch(CMT)
  ]);

  const data = await dataRes.json();
  const comments = await cmtRes.json();

  const item = data.find(x=>String(x.key) === key);

  if(!item){
    app.innerHTML = "Không tìm thấy dữ liệu";
    return;
  }

  // random comment theo key để tránh trùng global
  const seed = key.charCodeAt(0);
  const selected = pickRandom(comments, 4 + (seed % 2));

  app.innerHTML = `
  <div class="layout">

    <div class="left">
      <div class="video">
        <iframe src="https://www.youtube.com/embed/${getYT(item.video)}"></iframe>
      </div>

      <h1>${item.title}</h1>

      <div class="comments">
        <h2>Bình luận nổi bật</h2>

        ${selected.map(c=>`
          <div class="cmt">
            <div class="avatar">
              ${c.avatar ? `<img src="${c.avatar}">` : maskName(c.name)[0]}
            </div>

            <div class="cmt-body">
              <div class="cmt-top">
                <b>${maskName(c.name)}</b>
                <span>${c.time}</span>
              </div>

              <div class="cmt-text">${c.text}</div>

              ${c.image ? `<img class="cmt-img" src="${c.image}">` : ""}

              <div class="cmt-actions">
                👍 ${Math.floor(Math.random()*50)}
                💬 ${Math.floor(Math.random()*10)}
              </div>
            </div>
          </div>
        `).join("")}

      </div>
    </div>

    <div class="right">
      <a href="${item.download}" target="_blank" class="btn">
        Tải file ngay
      </a>
    </div>

  </div>
  `;
}

init();
</script>

</body>
</html>
