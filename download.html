<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PminMod | Tải mod</title>
  <style>
    :root {
      --bg1: #020617;
      --bg2: #071427;
      --panel: rgba(10, 20, 42, 0.84);
      --text: #eef4ff;
      --muted: #9db1d6;
      --accent: #7dd3fc;
      --accent2: #93c5fd;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: Inter, Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(125,211,252,0.10), transparent 25%),
        radial-gradient(circle at top right, rgba(147,197,253,0.10), transparent 20%),
        linear-gradient(180deg, var(--bg1) 0%, #03101f 45%, var(--bg2) 100%);
      padding: 18px;
    }

    .wrap {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      text-decoration: none;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .layout {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 18px;
    }

    .panel {
      border-radius: 28px;
      overflow: hidden;
      border: 1px solid var(--border);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .preview {
      aspect-ratio: 16 / 9;
      background: #000;
    }

    .preview img,
    .preview iframe,
    .preview video {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border: 0;
    }

    .body {
      padding: 22px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1.05;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }

    .pill {
      font-size: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .download-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 900;
      color: #02111c;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
    }

    .box {
      margin-top: 16px;
      padding: 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      color: var(--muted);
      word-break: break-word;
      line-height: 1.65;
      font-size: 14px;
    }

    .error {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: var(--muted);
    }

    @media (max-width: 860px) {
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="index.html">← Quay lại trang chủ</a>
    <div id="app"></div>
  </div>

  <script>
    const DATA_FILE = 'data.json';
    const app = document.getElementById('app');

    function escapeHtml(str = '') {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getParam(name) {
      return new URL(window.location.href).searchParams.get(name);
    }

    function getYoutubeId(url = '') {
      const patterns = [
        /(?:youtube\.com\/watch\?v=)([a-zA-Z0-9_-]{11})/,
        /(?:youtu\.be\/)([a-zA-Z0-9_-]{11})/,
        /(?:youtube\.com\/embed\/)([a-zA-Z0-9_-]{11})/,
        /(?:youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/
      ];

      for (const pattern of patterns) {
        const match = url.match(pattern);
        if (match) return match[1];
      }

      try {
        const parsed = new URL(url);
        return parsed.searchParams.get('v');
      } catch {
        return null;
      }
    }

    function normalizeGithubVideo(url = '') {
      if (!url.includes('github.com') || !url.includes('/blob/')) return url;
      return url.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
    }

    function isVideoFile(url = '') {
      return /\.(mp4|webm|ogg|mov)(\?.*)?$/i.test(url);
    }

    function normalizeItem(item) {
      return {
        key: item.key || '',
        title: item['tiêu đề'] || item.title || 'Chưa có tiêu đề',
        category: item.category || 'mod-lẻ',
        video: item['link video youtube'] || item.video || '',
        download: item['link tải file'] || item.download || '#',
        thumbnail: item.thumbnail || ''
      };
    }

    function renderMedia(item) {
      const ytId = getYoutubeId(item.video);
      const videoUrl = normalizeGithubVideo(item.video || '');

      if (ytId) {
        return `
          <iframe
            src="https://www.youtube.com/embed/${ytId}?rel=0&playsinline=1"
            title="${escapeHtml(item.title)}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
          </iframe>
        `;
      }

      if (isVideoFile(videoUrl)) {
        return `
          <video controls preload="metadata" playsinline>
            <source src="${escapeHtml(videoUrl)}">
          </video>
        `;
      }

      if (item.thumbnail) {
        return `<img src="${escapeHtml(item.thumbnail)}" alt="${escapeHtml(item.title)}">`;
      }

      return `<div style="width:100%;height:100%;display:grid;place-items:center;color:#9db1d6;">Không có preview</div>`;
    }

    function renderError(message) {
      app.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
    }

    async function init() {
      const apiKey = getParam('api');
      if (!apiKey) {
        renderError('Thiếu tham số api.');
        return;
      }

      try {
        const res = await fetch(DATA_FILE, { cache: 'no-store' });
        if (!res.ok) throw new Error('Không đọc được data.json');

        const raw = await res.json();
        const items = raw.map(normalizeItem);
        const item = items.find(x => String(x.key) === String(apiKey));

        if (!item) {
          renderError(`Không tìm thấy dữ liệu cho key: ${apiKey}`);
          return;
        }

        app.innerHTML = `
          <div class="layout">
            <section class="panel">
              <div class="preview">${renderMedia(item)}</div>
              <div class="body">
                <h1>${escapeHtml(item.title)}</h1>
                <p>Đây là trang tải file riêng cho mục này, đã tách khỏi trang chủ để gọn hơn và ổn định hơn.</p>
                <div class="row">
                  <span class="pill">Key: ${escapeHtml(item.key)}</span>
                  <span class="pill">Danh mục: ${escapeHtml(item.category)}</span>
                </div>
              </div>
            </section>

            <aside class="panel">
              <div class="body">
                <h2 style="margin:0 0 10px;font-size:28px;">Tải file mod</h2>
                <p>Bấm nút dưới đây để mở link tải file đã khai báo trong JSON.</p>
                <a class="download-btn" href="${escapeHtml(item.download)}" target="_blank" rel="noopener noreferrer">Tải file ngay</a>
                <div class="box"><b>Link video:</b><br>${escapeHtml(item.video || 'Không có')}</div>
                <div class="box"><b>Link tải:</b><br>${escapeHtml(item.download)}</div>
              </div>
            </aside>
          </div>
        `;
      } catch (err) {
        renderError(err.message || 'Đã xảy ra lỗi.');
      }
    }

    init();
  </script>
</body>
</html>
